<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div>

        <!-- tax form -->
        <div>
            <form id="taxform">
                <div class="mb-3">
                    <label for="exampleInputEmail1" class="form-label">Basic Salary</label>
                    <input type="number" id="basic" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">

                </div>
                <div class="mb-3">
                    <label for="exampleInputPassword1" class="form-label">Benefits</label>
                    <input type="number" id="benefits" class="form-control" id="exampleInputPassword1">
                </div>

                <button type="submit" class="btn btn-primary">Calculate</button>
            </form>
        </div>


        <!-- table -->

        <div>
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">TAX CATEGORY</th>
                        <th scope="col">TAX VALUE</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Gross Salary</td>
                        <td id="gross"></td>
                    </tr>
                    <tr>
                        <td>NHIF</td>
                        <td id="nhif"></td>
                    </tr>
                    <tr>
                        <td>NSSF</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>NHDF</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>Taxable Income</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>PAYE</td>
                        <td></td>
                    </tr>
                    <tr>
                        <td>Net Pay</td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
    <script src="tax.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
