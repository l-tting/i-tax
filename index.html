<!DOCTYPE html>
<html lang="en">

<head>

                <div class="mb-3">

        <!-- table -->

                </thead>

                <tbody>
                    <tr>
                        <td>Gross Salary</td>

                    </tr>
                </tbody>
            </table>
        </div>

    </div>
